<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我が家の現在の状態</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: sans-serif;
  }

  #mobile-status {
    display: none;
  }

  @media (max-width: 700px) {
    #home-status {
      display: none;
    }

    #mobile-status {
      display: block;
      box-sizing: border-box;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px;
      background: #f4f6f2;
    }

    .mobile-title {
      margin-bottom: 4px;
      color: #374337;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .mobile-subtitle {
      margin-bottom: 12px;
      color: #777;
      font-size: 12px;
      text-align: center;
    }

    .mobile-house {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 16px;
      display: block;
    }

    .mobile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mobile-card {
      box-sizing: border-box;
      min-height: 88px;
      padding: 12px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
    }

    .mobile-label {
      display: block;
      margin-bottom: 7px;
      color: #777;
      font-size: 12px;
    }

    .mobile-value {
      display: block;
      color: #2f7b42;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.25;
    }

    .mobile-status-bar {
      margin-top: 10px;
      padding: 11px;
      background: #fff;
      border-radius: 14px;
      color: #2f7b42;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    #mobile-updated {
      margin-top: 10px;
      color: #888;
      font-size: 12px;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div id="home-status" style="position:relative;width:100%;max-width:960px;margin:0 auto;aspect-ratio:1456/1092;background-image:url('https://raw.githubusercontent.com/kameplan/minnano_offgrid2/main/assets/house-bg.png');background-size:contain;background-repeat:no-repeat;background-position:top center;font-family:sans-serif;">
<div id="hs-updated" style="text-align:center;font-size:12px;color:#999;margin-top:6px;">データ更新：--</div>
  
  <div style="position:absolute;left:12%;top:23.5%;width:9%;">
    <div style="font-size:0.85vw;color:#333;font-weight:600;">発電</div>
    <div id="hs-solar" style="font-size:1.3vw;font-weight:720;color:#2f8f3f;line-height:1.1;">-- kW</div>
    <div style="font-size:0.6vw;color:#888;">太陽光発電</div>
  </div>

  <div style="position:absolute;left:12%;top:41.5%;width:9%;">
    <div style="font-size:0.85vw;color:#333;font-weight:600;">蓄電</div>
    <div id="hs-battery" style="font-size:1.3vw;font-weight:720;color:#2f8f3f;line-height:1.1;">-- %</div>
    <div style="font-size:0.6vw;color:#888;">残量</div>
  </div>

  <div style="position:absolute;left:12%;top:59.5%;width:9%;">
    <div style="font-size:0.85vw;color:#333;font-weight:600;">消費電力</div>
    <div id="hs-usage" style="font-size:1.3vw;font-weight:720;color:#2f8f3f;line-height:1.1;">-- kW</div>
    <div style="font-size:0.6vw;color:#888;">消費電力</div>
  </div>

  <div style="position:absolute;left:90%;top:36.5%;width:11%;">
    <div style="font-size:0.85vw;color:#333;font-weight:600;">電力系統</div>
    <div style="font-size:1.0vw;color:#888;">買電 <span id="hs-buy" style="font-weight:700;">--</span> kW</div>
    <div style="font-size:1.0vw;color:#2f8f3f;">売電 <span id="hs-sell" style="font-weight:700;">--</span> kW</div>
  </div>

  <div style="position:absolute;left:27%;top:83%;width:56%;font-size:0.85vw;color:#333;">
    <span id="hs-status" style="color:#2f8f3f;font-weight:700;">オフグリッド運転中</span>
    <span style="margin-left:8px;">太陽光と蓄電池で、暮らしのエネルギーをまかなっています。</span>
  </div>

  <div style="position:absolute;left:11.5%;top:91.5%;width:20%;font-size:0.75vw;color:#333;">
    <div>外気温</div>
    <div id="hs-outdoor" style="font-size:1.3vw;font-weight:700;">-- ℃</div>
  </div>

  <div style="position:absolute;left:32.5%;top:91.5%;width:20%;font-size:0.75vw;color:#333;">
    <div>1F温湿度</div>
    <div id="hs-floor1" style="font-size:1.3vw;font-weight:700;">-- ℃ / --%</div>
  </div>

  <div style="position:absolute;left:56.5%;top:91.5%;width:20%;font-size:0.75vw;color:#333;">
    <div>2F温湿度</div>
    <div id="hs-floor2" style="font-size:1.3vw;font-weight:700;">-- ℃ / --%</div>
  </div>

  <div style="position:absolute;left:80.5%;top:91.5%;width:20%;font-size:0.75vw;color:#333;">
    <div>小屋裏温湿度</div>
    <div id="hs-attic" style="font-size:1.3vw;font-weight:700;">-- ℃ / --%</div>
  </div>

</div>

<script>
function fetchHomeStatus() {
  var url = 'data/home_status.json?_=' + Date.now();
  fetch(url)
    .then(function(res){
      if (!res.ok) {
        throw new Error('HTTPステータスエラー: ' + res.status);
      }
      return res.json();
    })
    .then(function(d){
      var solarKw = (Math.abs(d.solar.power_w) / 1000).toFixed(2);
      document.getElementById('hs-solar').textContent = solarKw + ' kW';

      document.getElementById('hs-battery').textContent = d.battery.soc_percent + ' %';

      var gridW = d.grid.power_w;
      var isSelling = d.grid.status === 'selling';
      var buyKw = isSelling ? 0 : (gridW / 1000).toFixed(2);
      var sellKw = isSelling ? (Math.abs(gridW) / 1000).toFixed(2) : 0;
      document.getElementById('hs-buy').textContent = buyKw;
      document.getElementById('hs-sell').textContent = sellKw;

      var usageKw = ((d.solar.power_w + gridW) / 1000).toFixed(2);
      document.getElementById('hs-usage').textContent = usageKw + ' kW';

      document.getElementById('hs-outdoor').textContent = d.climate.outdoor.temperature + ' ℃';
      document.getElementById('hs-floor1').textContent = d.climate.floor1.temperature + ' ℃ / ' + d.climate.floor1.humidity + '%';
      document.getElementById('hs-floor2').textContent = d.climate.floor2.temperature + ' ℃ / ' + d.climate.floor2.humidity + '%';
      document.getElementById('hs-attic').textContent = d.climate.attic.temperature + ' ℃ / ' + d.climate.attic.humidity + '%';

      document.getElementById('hs-status').textContent = (d.grid.status === 'buying' && d.grid.power_w > 50) ? '系統から補給中' : 'オフグリッド運転中';

      var updatedDate = new Date(d.updated_at);
      var hh = updatedDate.getHours();
      var mm = updatedDate.getMinutes();
      var mmStr = (mm < 10 ? '0' : '') + mm;
      document.getElementById('hs-updated').textContent = 'データ更新：' + hh + '時' + mmStr + '分';

      console.log('[home-status] 取得成功: ' + new Date().toLocaleTimeString('ja-JP'));
    })
    .catch(function(e){
      console.error('[home-status] 取得失敗 (' + new Date().toLocaleTimeString('ja-JP') + '): ' + e.message);
    });
}

fetchHomeStatus();
setInterval(fetchHomeStatus, 30000);
</script>

</body>
</html>
