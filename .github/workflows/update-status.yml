name: Update Home Status

on:
  repository_dispatch:
    types: [home_status_update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write home status JSON
        env:
          STATUS_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status = json.loads(os.environ["STATUS_JSON"])

          path = Path("docs/data/home_status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(
              json.dumps(status, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print(json.dumps(status, ensure_ascii=False, indent=2))
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/home_status.json
          git diff --staged --quiet && exit 0
          git commit -m "Update home status from Home Assistant"
          git pull --rebase origin main
          git push
